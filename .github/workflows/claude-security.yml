name: claude-security

on:
  workflow_call:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude security review
        id: scan
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: "true"
          upload-results: "true"
          exclude-directories: "node_modules,dist,build,.next,coverage,vendor"

      - name: Gate on HIGH/CRITICAL findings
        if: always()
        run: |
          RESULTS="claudecode-results.json"
          if [ ! -f "$RESULTS" ]; then
            echo "No results file found; nothing to gate on."
            exit 0
          fi

          if jq -e '.error' "$RESULTS" >/dev/null 2>&1; then
            echo "::warning::Scan reported an error; not blocking merge on scan failure."
            exit 0
          fi

          BLOCKING=$(jq '[.findings[]? | select((.severity | ascii_upcase) == "HIGH" or (.severity | ascii_upcase) == "CRITICAL")] | length' "$RESULTS")
          echo "HIGH/CRITICAL findings: $BLOCKING"

          if [ "$BLOCKING" -gt 0 ]; then
            echo "::error::$BLOCKING HIGH/CRITICAL security finding(s) detected. Resolve them before merging."
            jq -r '.findings[]? | select((.severity | ascii_upcase) == "HIGH" or (.severity | ascii_upcase) == "CRITICAL") | "- [\(.severity)] \(.file):\(.line) — \(.description)"' "$RESULTS"
            exit 1
          fi

          echo "No HIGH/CRITICAL findings. Gate passed."
