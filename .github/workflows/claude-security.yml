name: claude-security

on:
  workflow_call:
    inputs:
      claude-model:
        required: false
        type: string
        default: ""
      exclude-directories:
        required: false
        type: string
        default: "node_modules,dist,build,.next,coverage,vendor"
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      SLACK_SECURITY_WEBHOOK:
        required: false

jobs:
  pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout security scripts
        uses: actions/checkout@v4
        with:
          repository: arvore-builders/.github
          ref: main
          path: .security-pipeline

      - name: Claude security review
        id: scan
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: "true"
          upload-results: "true"
          exclude-directories: ${{ inputs.exclude-directories }}
          claude-model: ${{ inputs.claude-model }}

      - name: Evaluate findings and notify
        if: always()
        env:
          SLACK_SECURITY_WEBHOOK: ${{ secrets.SLACK_SECURITY_WEBHOOK }}
          CONTEXT_KIND: "pull_request"
          CONTEXT_REF: ${{ github.event.pull_request.html_url }}
          CONTEXT_TITLE: ${{ github.event.pull_request.title }}
          CONTEXT_REPO: ${{ github.repository }}
          CONTEXT_ACTOR: ${{ github.actor }}
        run: bash .security-pipeline/.github/security-scripts/evaluate-and-notify.sh claudecode-results.json

  push-review:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout security scripts
        uses: actions/checkout@v4
        with:
          repository: arvore-builders/.github
          ref: main
          path: .security-pipeline

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI and jq
        run: |
          npm install -g @anthropic-ai/claude-code
          sudo apt-get update && sudo apt-get install -y jq

      - name: Run push security scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ inputs.claude-model }}
          EXCLUDE_DIRECTORIES: ${{ inputs.exclude-directories }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: bash .security-pipeline/.github/security-scripts/push-scan.sh

      - name: Evaluate findings and notify
        if: always()
        env:
          SLACK_SECURITY_WEBHOOK: ${{ secrets.SLACK_SECURITY_WEBHOOK }}
          CONTEXT_KIND: "push"
          CONTEXT_REF: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          CONTEXT_TITLE: ${{ github.event.head_commit.message }}
          CONTEXT_REPO: ${{ github.repository }}
          CONTEXT_ACTOR: ${{ github.actor }}
        run: bash .security-pipeline/.github/security-scripts/evaluate-and-notify.sh claudecode-results.json
